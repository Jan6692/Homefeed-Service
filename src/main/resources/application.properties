spring.application.name=Homefeed-Service

server.port=8080

# File-based H2 database (persists to disk, similar behavior to the SQLite setup).
# Use jdbc:h2:mem:appdb instead if you want a purely in-memory DB that resets on every restart.
spring.datasource.url=jdbc:h2:file:./data/appdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# schema.sql / data.sql manage the schema and seed data
spring.sql.init.mode=always

# Optional: browser-based DB console at http://localhost:8080/h2-console
# Use JDBC URL jdbc:h2:file:./data/appdb, username sa, empty password to connect.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console